[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  ignore = "node ./scripts/netlify-ignore-non-release.mjs"

[[redirects]]
  from = "/api/gemini"
  to = "/.netlify/functions/gemini"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
